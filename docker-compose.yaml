services:
  icmprut-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: icmprut-server:latest
    container_name: icmprut-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3089:3089"
    env_file:
      - .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3089/api/health', { signal: AbortSignal.timeout(4000) }).then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 15s
